<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acme Planta Macondo</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <app-root></app-root>
    </div>

    <template id="login-view-template">
      <div class="login-shell">
        <div class="login-intro">
          <h1>Acme Planta Macondo</h1>
          <p>Gestione usuarios, materias primas, inventarios y procesos de producción desde un solo tablero.</p>
        </div>
        <div class="login-panel">
          <h2>Acceso al sistema</h2>
          <div class="form-grid">
            <div class="input-group">
              <label for="loginId">Número de identificación</label>
              <input id="loginId" type="text" placeholder="12345678" />
            </div>
            <div class="input-group">
              <label for="loginPassword">Contraseña</label>
              <input id="loginPassword" type="password" placeholder="********" />
            </div>
            <button class="primary" id="loginButton">Iniciar sesión</button>
            <div class="alert hidden" id="loginMessage"></div>
          </div>
          <div style="margin-top: 32px;">
            <h2>Registrar nuevo usuario</h2>
            <div class="form-grid">
              <div class="input-group">
                <label for="registerId">Número de identificación</label>
                <input id="registerId" type="text" placeholder="12345678" />
              </div>
              <div class="input-group">
                <label for="registerName">Nombre completo</label>
                <input id="registerName" type="text" placeholder="María Pacheco" />
              </div>
              <div class="input-group">
                <label for="registerRole">Cargo</label>
                <input id="registerRole" type="text" placeholder="Administrador" />
              </div>
              <div class="input-group">
                <label for="registerPassword">Contraseña</label>
                <input id="registerPassword" type="password" placeholder="******" />
              </div>
              <div class="input-group">
                <label for="registerPassword2">Repetir contraseña</label>
                <input id="registerPassword2" type="password" placeholder="******" />
              </div>
              <button class="secondary" id="registerButton">Registrar usuario</button>
              <div class="alert hidden" id="registerMessage"></div>
            </div>
          </div>
        </div>
      </div>
    </template>

    <template id="dashboard-view-template">
      <div class="app-shell dashboard-shell">
        <aside class="sidebar">
          <div class="brand">
            <h1>Acme</h1>
            <p>Planta Macondo</p>
          </div>
          <nav class="sidebar-nav">
            <button data-section="users">Usuarios</button>
            <button data-section="inventory">Inventario</button>
            <button data-section="production">Producción</button>
            <button data-section="recipes">Recetas</button>
            <button data-section="report">Inventarios</button>
            <button class="secondary" id="logoutButton">Cerrar sesión</button>
          </nav>
        </aside>
        <main class="main-content">
          <header class="header">
            <div>
              <h2 id="welcomeHeader"></h2>
              <p class="small" id="userRoleHeader"></p>
            </div>
          </header>
          <section class="panel" id="sectionContainer"></section>
        </main>
      </div>
    </template>

    <template id="user-module-template">
      <div>
        <h2>Gestión de usuarios</h2>
        <div class="form-grid">
          <div class="input-group">
            <label for="userId">Número de identificación</label>
            <input id="userId" type="text" placeholder="12345678" />
          </div>
          <div class="input-group">
            <label for="userName">Nombre completo</label>
            <input id="userName" type="text" placeholder="Ana Fernández" />
          </div>
          <div class="input-group">
            <label for="userRole">Cargo</label>
            <input id="userRole" type="text" placeholder="Coordinador" />
          </div>
          <div class="input-group">
            <label for="userPassword">Contraseña</label>
            <input id="userPassword" type="password" placeholder="******" />
          </div>
          <div class="input-group">
            <label for="confirmPassword">Confirmar contraseña</label>
            <input id="confirmPassword" type="password" placeholder="******" />
          </div>
          <div class="flex">
            <button class="primary" id="saveUser">Guardar usuario</button>
            <button class="secondary hidden" id="cancelEdit">Cancelar edición</button>
          </div>
        </div>
        <div class="table-wrapper" style="margin-top:24px;">
          <table>
            <thead><tr><th>ID</th><th>Nombre</th><th>Cargo</th><th>Acciones</th></tr></thead>
            <tbody id="userTableBody">
            </tbody>
          </table>
        </div>
      </div>
    </template>

    <template id="inventory-module-template">
      <div>
        <h2 id="inventoryTitle">Registrar producto</h2>
        <div class="panel" style="margin-bottom:24px;">
          <div class="form-grid" style="margin-top:16px;">
            <div class="input-group">
              <label for="productCode">Código</label>
              <input id="productCode" type="text" placeholder="PR-001" />
            </div>
            <div class="input-group">
              <label for="productName">Nombre del producto</label>
              <input id="productName" type="text" placeholder="Harina" />
            </div>
            <div class="input-group">
              <label for="productProvider">Proveedor</label>
              <input id="productProvider" type="text" placeholder="Molinos Macondo" />
            </div>
            <div class="input-group">
              <label for="productType">Tipo</label>
              <select id="productType">
                <option value="raw">Materia prima</option>
                <option value="finished">Producto terminado</option>
              </select>
            </div>
            <div class="input-group">
              <label for="productStock">Cantidad en stock</label>
              <input id="productStock" type="number" min="0" placeholder="0" />
            </div>
          </div>
          <div id="recipeSection" class="panel" style="margin-top:16px; display:none;">
            <h3>Receta del producto</h3>
            <p style="margin:0 0 8px;">Agregue los ingredientes que se consumirán al fabricar este producto.</p>
            <div id="recipeRows"></div>
            <button type="button" class="secondary" id="addRecipeIngredient" style="margin-top:8px;">Agregar ingrediente</button>
          </div>
          <div class="flex" style="margin-top: 14px; gap: 12px; flex-wrap:wrap;">
            <button class="primary" id="saveProduct">Guardar producto</button>
            <button class="secondary hidden" id="cancelEdit">Cancelar edición</button>
          </div>
        </div>
        <div class="table-wrapper" style="margin-top:24px;">
          <table>
            <thead><tr><th>Código</th><th>Nombre</th><th>Proveedor</th><th>Tipo</th><th>Stock</th><th>Acciones</th></tr></thead>
            <tbody id="productTableBody">
            </tbody>
          </table>
        </div>
      </div>
    </template>

    <template id="production-module-template">
      <div>
        <h2>Módulo de producción</h2>
        <div class="form-grid">
          <div class="input-group">
            <label for="productToMake">Producto a fabricar</label>
            <select id="productToMake">
              <option value="">Seleccione</option>
            </select>
          </div>
          <div class="input-group">
            <label for="produceQuantity">Cantidad a fabricar</label>
            <input id="produceQuantity" type="number" min="1" placeholder="10" />
          </div>
          <button class="primary" id="produceButton">Generar producción</button>
        </div>
        <div id="productionMessage"></div>
        <div id="selectedRecipe" style="margin-top:16px;"></div>
        <div id="producedResult" style="margin-top:16px;"></div>
        <div class="panel" style="margin-top:24px;">
          <h3>Resumen de producción</h3>
          <div class="table-wrapper">
            <table>
              <thead><tr><th>Código</th><th>Producto</th><th>Cantidad</th><th>Materia prima usada</th></tr></thead>
              <tbody id="productionTableBody">
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </template>

  
    <template id="inventory-report-template">
      <div>
        <h2>Módulo de inventarios</h2>
        <div class="input-group">
          <label for="searchInventory">Buscar producto</label>
          <input id="searchInventory" type="search" placeholder="Filtrar por nombre, código o proveedor" />
        </div>
        <div class="table-wrapper" style="margin-top:16px;">
          <table>
            <thead><tr><th>Código</th><th>Nombre</th><th>Proveedor</th><th>Tipo</th><th>Stock</th><th>Fórmula</th></tr></thead>
            <tbody id="reportTableBody">
            </tbody>
          </table>
        </div>
      </div>
    </template>

    <template id="recipe-module-template">
      <div>
        <h2>Recetas de productos terminados</h2>
        <div class="table-wrapper" style="margin-top:16px;">
          <table>
            <thead><tr><th>Código</th><th>Producto</th><th>Receta</th></tr></thead>
            <tbody id="recipeTableBody"></tbody>
          </table>
        </div>
      </div>
    </template>

    <script type="module" src="app.js"></script>
  </body>
</html>
